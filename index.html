<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ZAID BWP STOCK MANAGER</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0078d4">
  <meta name="vapid-key" content="YOUR_VAPID_PUBLIC_KEY">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body class="win-desktop">

  <!-- Desktop Folders -->
  <div class="desktop-area" id="desktop-area">
    <div class="desktop-folders" id="desktop-folders">
      <div class="folder-icon" data-section="items" ondblclick="openFolder('items')" ontouchend="handleTouch(event,'items')">
        <div class="folder-svg">
          <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path d="M4 8h16l4 4h20v28H4V8z" fill="#FFC107"/><path d="M4 14h40v26H4V14z" fill="#FFD54F"/><path d="M4 14h40v3H4v-3z" fill="#FFCA28" opacity=".5"/></svg>
        </div>
        <span class="folder-label">Items</span>
        <span class="folder-badge" id="badge-items"></span>
      </div>
      <div class="folder-icon" data-section="wallet" ondblclick="openFolder('wallet')" ontouchend="handleTouch(event,'wallet')">
        <div class="folder-svg">
          <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path d="M4 8h16l4 4h20v28H4V8z" fill="#4CAF50"/><path d="M4 14h40v26H4V14z" fill="#66BB6A"/><path d="M4 14h40v3H4v-3z" fill="#43A047" opacity=".5"/></svg>
        </div>
        <span class="folder-label">Wallet</span>
        <span class="folder-badge" id="badge-wallet"></span>
      </div>
      <div class="folder-icon" data-section="person" ondblclick="openFolder('person')" ontouchend="handleTouch(event,'person')">
        <div class="folder-svg">
          <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path d="M4 8h16l4 4h20v28H4V8z" fill="#2196F3"/><path d="M4 14h40v26H4V14z" fill="#42A5F5"/><path d="M4 14h40v3H4v-3z" fill="#1E88E5" opacity=".5"/></svg>
        </div>
        <span class="folder-label">Person</span>
        <span class="folder-badge" id="badge-person"></span>
      </div>
      <div class="folder-icon" data-section="maintenance" ondblclick="openFolder('maintenance')" ontouchend="handleTouch(event,'maintenance')">
        <div class="folder-svg">
          <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path d="M4 8h16l4 4h20v28H4V8z" fill="#FF5722"/><path d="M4 14h40v26H4V14z" fill="#FF7043"/><path d="M4 14h40v3H4v-3z" fill="#F4511E" opacity=".5"/></svg>
        </div>
        <span class="folder-label">Maintenance</span>
        <span class="folder-badge" id="badge-maintenance"></span>
      </div>
      <div class="folder-icon" data-section="samples" ondblclick="openFolder('samples')" ontouchend="handleTouch(event,'samples')">
        <div class="folder-svg">
          <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path d="M4 8h16l4 4h20v28H4V8z" fill="#9C27B0"/><path d="M4 14h40v26H4V14z" fill="#AB47BC"/><path d="M4 14h40v3H4v-3z" fill="#8E24AA" opacity=".5"/></svg>
        </div>
        <span class="folder-label">Samples</span>
        <span class="folder-badge" id="badge-samples"></span>
      </div>
      <div class="folder-icon" data-section="clipping" ondblclick="openFolder('clipping')" ontouchend="handleTouch(event,'clipping')">
        <div class="folder-svg">
          <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path d="M4 8h16l4 4h20v28H4V8z" fill="#E91E63"/><path d="M4 14h40v26H4V14z" fill="#EC407A"/><path d="M4 14h40v3H4v-3z" fill="#D81B60" opacity=".5"/></svg>
        </div>
        <span class="folder-label">Clipping</span>
        <span class="folder-badge" id="badge-clipping"></span>
      </div>
    </div>
  </div>

  <!-- Windows Container -->
  <div class="win-windows" id="win-windows"></div>

  <!-- Taskbar -->
  <div class="win-taskbar" id="win-taskbar">
    <button class="taskbar-start" id="taskbar-start" title="Start">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor"><rect x="1" y="1" width="10" height="10"/><rect x="13" y="1" width="10" height="10"/><rect x="1" y="13" width="10" height="10"/><rect x="13" y="13" width="10" height="10"/></svg>
    </button>
    <div class="taskbar-apps" id="taskbar-apps"></div>
    <div class="taskbar-tray">
      <div class="taskbar-search-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="taskbar-search" placeholder="Search..." class="taskbar-search-input">
      </div>
      <div class="taskbar-live"><span class="live-dot"></span> Live</div>
      <a href="/admin.html" class="taskbar-admin" title="Admin Panel">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </a>
      <div class="taskbar-clock" id="taskbar-clock"></div>
    </div>
  </div>

  <!-- Start Menu -->
  <div class="start-menu" id="start-menu" style="display:none;">
    <div class="start-header">
      <div class="start-title">ZAID BWP STOCK MANAGER</div>
      <div class="start-subtitle">Inventory & Business Dashboard</div>
    </div>
    <div class="start-tiles" id="start-tiles">
      <div class="start-tile tile-blue" onclick="openFolder('items');toggleStartMenu()">
        <div class="tile-icon">📦</div>
        <div class="tile-name">Items</div>
        <div class="tile-count" id="tile-items">0</div>
      </div>
      <div class="start-tile tile-green" onclick="openFolder('wallet');toggleStartMenu()">
        <div class="tile-icon">💰</div>
        <div class="tile-name">Wallet</div>
        <div class="tile-count" id="tile-wallet">Rs. 0</div>
      </div>
      <div class="start-tile tile-sky" onclick="openFolder('person');toggleStartMenu()">
        <div class="tile-icon">👥</div>
        <div class="tile-name">Person</div>
        <div class="tile-count" id="tile-person">0</div>
      </div>
      <div class="start-tile tile-orange" onclick="openFolder('maintenance');toggleStartMenu()">
        <div class="tile-icon">🔧</div>
        <div class="tile-name">Maintenance</div>
        <div class="tile-count" id="tile-maintenance">0</div>
      </div>
      <div class="start-tile tile-purple" onclick="openFolder('samples');toggleStartMenu()">
        <div class="tile-icon">🧪</div>
        <div class="tile-name">Samples</div>
        <div class="tile-count" id="tile-samples">0</div>
      </div>
      <div class="start-tile tile-pink" onclick="openFolder('clipping');toggleStartMenu()">
        <div class="tile-icon">✂️</div>
        <div class="tile-name">Clipping</div>
        <div class="tile-count" id="tile-clipping">0</div>
      </div>
    </div>
    <div class="start-footer">
      <a href="/admin.html" class="start-admin-link">⚙️ Admin Panel</a>
      <div class="start-footer-info">Developed by ZAID ASHIQ BWP</div>
    </div>
  </div>

  <!-- Install Banner (PWA) -->
  <div id="install-banner" class="install-banner" style="display:none;">
    <span class="install-banner-text">Install this app for quick access</span>
    <button class="btn btn-primary btn-sm" id="install-btn">Install</button>
  </div>

  <script type="module" src="/js/pages/dashboard.js"></script>
</body>
</html>
